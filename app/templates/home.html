{% extends "base.html" %}

{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-8">
    <div class="border border-gray-800 p-8 flex flex-col items-center text-center">
        <h3 class="text-gray-400 mb-2 uppercase text-sm tracking-wider">Total Employees</h3>
        <h1 class="text-6xl font-bold text-white mb-8">{{ total_employees|default(0) }}</h1>
        <a href="/emp" class="bg-white text-black px-6 py-2 text-sm hover:bg-gray-200 transition-colors w-full">View Employees</a>
    </div>

    <div class="border border-gray-800 p-8 flex flex-col items-center text-center">
        <h3 class="text-gray-400 mb-2 uppercase text-sm tracking-wider">Total Departments</h3>
        <h1 class="text-6xl font-bold text-white mb-8">{{ total_departments|default(0) }}</h1>
        <a href="/depart" class="bg-white text-black px-6 py-2 text-sm hover:bg-gray-200 transition-colors w-full">View Departments</a>
    </div>
</div>
{% endblock %}
