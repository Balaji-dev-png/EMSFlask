{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-2">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0 fw-bold">Employee Details</h4>
                <span class="badge bg-light text-dark">ID: {{employee.id}}</span>
            </div>
            <div class="card-body p-4">
                <div class="row mb-3">
                    <div class="col-sm-4 text-muted fw-semibold">Name</div>
                    <div class="col-sm-8 fw-bold fs-5">{{employee.name}}</div>
                </div>
                <hr>
                <div class="row mb-3">
                    <div class="col-sm-4 text-muted fw-semibold">Email</div>
                    <div class="col-sm-8">{{employee.email}}</div>
                </div>
                <hr>
                <div class="row mb-3">
                    <div class="col-sm-4 text-muted fw-semibold">Department</div>
                    <div class="col-sm-8"><span class="badge bg-secondary">{{employee.department}}</span></div>
                </div>
                <hr>
                <div class="row mb-4">
                    <div class="col-sm-4 text-muted fw-semibold">Salary</div>
                    <div class="col-sm-8">₹{{employee.salary}}</div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                    <a href="/emp" class="btn btn-outline-secondary px-4">Back to List</a>
                    <a href="/emp/empdetail/{{employee.id}}" class="btn btn-warning px-4">Edit</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
