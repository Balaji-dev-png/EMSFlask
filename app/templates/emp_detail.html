{% extends "base.html" %}

{% block content %}
<div class="flex justify-center mt-8">
    <div class="w-full max-w-lg">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-2xl font-bold text-white uppercase tracking-wider">
                Profile
            </h3>
            <a href="/emp" class="text-sm text-gray-400 hover:text-white underline">Back</a>
        </div>
        
        <div class="border border-gray-800 p-8">
            <!-- Header -->
            <div class="text-center pb-8 border-b border-gray-800">
                <h2 class="text-4xl font-bold text-white mb-4">{{employee.name}}</h2>
                <span class="inline-block bg-white text-black font-bold px-4 py-1 text-sm uppercase tracking-wider">{{employee.department}}</span>
            </div>
            
            <!-- Details List -->
            <div class="pt-8 space-y-6">
                <div class="flex justify-between items-center">
                    <div class="text-gray-400 text-sm uppercase tracking-wider">Email</div>
                    <div class="text-white">{{employee.email}}</div>
                </div>
                <div class="flex justify-between items-center">
                    <div class="text-gray-400 text-sm uppercase tracking-wider">Employee ID</div>
                    <div class="text-white">#{{employee.id}}</div>
                </div>
                <div class="flex justify-between items-center">
                    <div class="text-gray-400 text-sm uppercase tracking-wider">Salary</div>
                    <div class="text-white text-xl font-bold">₹{{employee.salary}}</div>
                </div>
                
                <div class="pt-8 mt-8 border-t border-gray-800">
                    <a href="/emp/update/{{employee.id}}" class="block w-full text-center bg-white text-black font-bold py-3 uppercase tracking-wider hover:bg-gray-200 transition-colors">
                        Edit Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
