{% extends "base.html" %}

{% block content %}
<div class="flex justify-center mt-8">
    <div class="w-full max-w-lg">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-white uppercase tracking-wider">
                Update Employee
            </h2>
            <a href="/emp" class="text-sm text-gray-400 hover:text-white underline">Cancel</a>
        </div>
        
        <div class="border border-gray-800 p-8">
            <form action="/emp/update/{{employee.id}}" method="POST">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Full Name</label>
                        <input type="text" name="name" value="{{employee.name}}" required class="w-full bg-black text-white px-4 py-3 border border-gray-800 outline-none focus:border-white transition-colors">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                        <input type="email" name="email" value="{{employee.email}}" required class="w-full bg-black text-white px-4 py-3 border border-gray-800 outline-none focus:border-white transition-colors">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Department</label>
                        <input type="text" name="department" value="{{employee.department}}" required class="w-full bg-black text-white px-4 py-3 border border-gray-800 outline-none focus:border-white transition-colors">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Salary</label>
                        <input type="number" name="salary" value="{{employee.salary}}" required class="w-full bg-black text-white px-4 py-3 border border-gray-800 outline-none focus:border-white transition-colors">
                    </div>
                    
                    <div class="pt-4 mt-8 border-t border-gray-800">
                        <button type="submit" class="w-full bg-white text-black font-bold py-3 text-sm hover:bg-gray-200 transition-colors uppercase tracking-wider">
                            Update Employee
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
